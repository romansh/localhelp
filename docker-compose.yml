services:
  laravel.test:
    image: sail-8.4-app
    build:
      context: ./docker/8.4
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
    environment:
      - WWWUSER=${WWWUSER}
      - SUPERVISOR_PHP_USER=sail
      - LARAVEL_SAIL=1
      - XDEBUG_MODE=${SAIL_XDEBUG_MODE:-off}
      - XDEBUG_CONFIG=${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}
      - IGNITION_LOCAL_SITES_PATH=${PWD}
      - APP_ENV=${APP_ENV}
      - APP_DEBUG=${APP_DEBUG}
      - APP_URL=${APP_URL}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=${DB_CONNECTION:-sqlite}
      - REVERB_PORT=${REVERB_PORT:-8080}
      - SUPERVISOR_PHP_COMMAND=php -d variables_order=EGPCS /var/www/html/artisan serve --host=0.0.0.0 --port=8000
    volumes:
      - .:/var/www/html
    labels:
      - "traefik.enable=true"
      # Main app
      - "traefik.http.routers.localhelp.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.localhelp.entrypoints=web"
      - "traefik.http.routers.localhelp.middlewares=compress"
      - "traefik.http.services.localhelp.loadbalancer.server.port=8000"
      # Cloudflare tunnel domain
      - "traefik.http.routers.localhelp-cloudflare.rule=Host(`${CLOUDFLARED_TUNNEL_DOMAIN}`)"
      - "traefik.http.routers.localhelp-cloudflare.entrypoints=web"
      - "traefik.http.routers.localhelp-cloudflare.middlewares=compress"
      - "traefik.http.routers.localhelp-cloudflare.service=localhelp"
      # Reverb WebSocket (ws subdomain)
      - "traefik.http.routers.localhelp-reverb.rule=Host(`ws.${TRAEFIK_HOST}`) || Host(`ws.${CLOUDFLARED_TUNNEL_DOMAIN}`)"
      - "traefik.http.routers.localhelp-reverb.entrypoints=web"
      - "traefik.http.services.localhelp-reverb.loadbalancer.server.port=${REVERB_PORT:-8080}"
      # Static files
      - "traefik.http.routers.static.rule=(Host(`${TRAEFIK_HOST}`) || Host(`${CLOUDFLARED_TUNNEL_DOMAIN}`)) && PathPrefix(`/build/assets/`)"
      - "traefik.http.routers.static.entrypoints=web"
      - "traefik.http.routers.static.middlewares=compress"
      - "traefik.http.routers.static.priority=10"
      - "traefik.http.routers.static.service=localhelp"
    networks:
      - sail

  traefik:
    image: traefik:latest
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    labels:
      - "traefik.http.middlewares.compress.compress=true"
    ports:
      - "80:80"
      - "9090:8080"  # Traefik dashboard on host port 9090
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sail

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    environment:
      CLOUDFLARED_TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN}
    depends_on:
      - traefik
    networks:
      - sail
    restart: unless-stopped

networks:
  sail:
    driver: bridge
